name: CI

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  pull_request:
    branches: [master, main]

permissions:
  contents: write # cần để tạo GitHub Release

jobs:
  # ─── Frontend: TypeScript + Build ───────────────────────────────────────
  frontend:
    name: Frontend (TS + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─── Rust: Tests ────────────────────────────────────────────────────────
  backend:
    name: Backend (Rust tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Linux Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib 2>&1

  # ─── Build DMG (macOS) ──────────────────────────────────────────────────
  build-dmg:
    name: Build DMG (macOS)
    runs-on: macos-latest
    needs: [frontend, backend]
    # Chạy khi push lên master HOẶC khi push tag v*
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload DMG artifact (tất cả các push)
        uses: actions/upload-artifact@v4
        with:
          name: SpamAPI-Pro-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14

      # ─── Chỉ tạo GitHub Release khi push tag v* ───
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SpamAPI Pro ${{ github.ref_name }}
          body: |
            ## 🚀 SpamAPI Pro ${{ github.ref_name }}

            ### Cài đặt
            1. Tải file `.dmg` bên dưới
            2. Mở file DMG → kéo **SpamAPI Pro.app** vào thư mục Applications
            3. Right-click → Open lần đầu (bypass Gatekeeper)

            ### Yêu cầu
            - macOS 12+ (Apple Silicon hoặc Intel)
          files: src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
